<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方炯20岁生日快乐</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: "Consolas", monospace;
            color: #b0c4de;
            cursor: default;
        }

        /* ===== Canvas 星空背景 ===== */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ===== 行星容器 ===== */
        #planetBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 3;
            pointer-events: none;
        }
        .planet-item {
            position: absolute;
            pointer-events: none;
            /* 取消自转，改用上下浮动动画 */
            animation: float 4s ease-in-out infinite;
            opacity: 0.75;
        }
        /* 删除原planetSpin自转动画，只保留float浮动动画 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-14px); }
            100% { transform: translateY(0px); }
        }
        .planet-item img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain
        }

        /* ===== 宇航员容器 ===== */
        #astroBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 3; /* 提升层级，覆盖文字 */
            pointer-events: none;
        }
        .astro-item {
            position: absolute;
            opacity: 0.8;
            animation: float 4s ease-in-out infinite;
            visibility: visible !important;
        }
        .astro-item img {
            width: 90px;
            height: auto;
            object-fit: contain;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-14px); }
            100% { transform: translateY(0px); }
        }

        /* ===== 文字内容层 ===== */
        .wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .star-id {
            font-size: 16px;
            letter-spacing: 4px;
            opacity: 0.6;
            margin-bottom: 24px;
            user-select: none;
        }

        .main-text {
            max-width: 600px;
            max-height: 40vh;
            overflow-y: auto;
            line-height: 2.2;
            font-size: 24px;
            opacity: 0.9;
            padding: 10px 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(176, 196, 222, 0.4) rgba(255, 255, 255, 0.05);
            scroll-snap-type: y mandatory;
        }
        .text-line {
            scroll-snap-align: center;
            padding: 6px 0;
            transition: all 0.3s ease;
            opacity: 0.6;
            font-size: 22px;
        }
        .text-line.active {
            font-size: 28px;
            opacity: 1;
            color: #e0edff;
            text-shadow: 0 0 12px rgba(200, 220, 255, 0.6);
        }
        .main-text::-webkit-scrollbar {
            width: 5px;
        }
        .main-text::-webkit-scrollbar-thumb {
            background: rgba(176, 196, 222, 0.4);
            border-radius: 3px;
        }
        .main-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .timer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.6;
            user-select: none;
        }

        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 13px;
            opacity: 0.35;
            user-select: none;
        }

        /* ===== 备忘录弹窗 ===== */
        .hidden-note {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 15, 25, 0.95);
            padding: 32px;
            border: 1px solid #445577;
            max-width: 500px;
            width: 90%;
            z-index: 10;
            display: none;
            font-size: 18px;
            line-height: 1.8;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(68, 85, 119, 0.3);
            backdrop-filter: blur(4px);
            cursor: pointer;
            user-select: none;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 480px) {
            .main-text {
                max-height: 50vh;
                padding: 10px 12px;
            }
            .text-line {
                font-size: 16px;
            }
            .text-line.active {
                font-size: 22px;
            }
            .star-id {
                font-size: 13px;
                letter-spacing: 2px;
            }
            .hidden-note {
                font-size: 16px;
                padding: 24px 20px;
            }
            .astro-item img {
                width: 70px;
            }
            .planet-item {
                animation-duration: 16s;
            }
        }
    </style>
</head>
<body>
<audio id="birthdayAudio" loop preload="auto">
    <!-- 音频替换为绝对地址 -->
    <source src="https://epohopes.github.io/birthday_song.mp3" type="audio/mpeg">
    您的浏览器不支持音频播放，请升级浏览器。
</audio>

    <canvas id="canvas"></canvas>
    <div id="planetBox"></div>
    <div id="astroBox"></div>

    <div class="wrap">
        <div class="star-id" id="starId">恒星编号：S-Fjong-2006-708</div>
        <div class="main-text" id="mainText">
            <div class="text-line">写给你的生日祝福</div>
            <div class="text-line">茫茫星海亿万光年</div>
            <div class="text-line">能与你相遇是极小概率的奇迹</div>
            <div class="text-line">祝你岁岁平安，生日快乐</div>
            <div class="text-line">往后每一年的星空，都有我陪你看</div>
        </div>
        <div class="timer" id="liveTime">计算中...</div>
        <div class="hint">双击星空打开私人备忘录 · 点击页面播放生日歌</div>
    </div>

    <div class="hidden-note" id="note">
        这里替换成你想写的私密心里话<br><br>
        点击弹窗任意位置关闭
    </div>

    <script>
        // ===================== 自定义配置区（全部图片改为绝对线上地址） =====================
        const birthday = new Date('2006-07-08');
        const starCode = 'Fjong-2006-708';

        // 16颗行星参数 - 完整CDN路径
        const planetConfig = [
            { img:'https://epohopes.github.io/planet1.png', xRatio:0.2, yRatio:0.3, speed:0.005, size:40 },
            { img:'https://epohopes.github.io/planet2.png', xRatio:0.8, yRatio:0.6, speed:-0.004, size:45 },
            { img:'https://epohopes.github.io/planet3.png', xRatio:0.3, yRatio:0.75, speed:0.006, size:30 },
            { img:'https://epohopes.github.io/planet4.png', xRatio:0.7, yRatio:0.22, speed:-0.003, size:35 },
            { img:'https://epohopes.github.io/planet5.png', xRatio:0.15, yRatio:0.55, speed:0.003, size:35 },
            { img:'https://epohopes.github.io/planet6.png', xRatio:0.85, yRatio:0.4, speed:-0.004, size:30 },
            { img:'https://epohopes.github.io/planet7.png', xRatio:0.45, yRatio:0.25, speed:0.004, size:45 },
            { img:'https://epohopes.github.io/planet8.png', xRatio:0.05, yRatio:0.15, speed:0.002, size:15 },
            { img:'https://epohopes.github.io/planet9.png', xRatio:0.9, yRatio:0.7, speed:-0.002, size:30 },
            { img:'https://epohopes.github.io/planet10.png',xRatio:0.55, yRatio:0.8, speed:0.005, size:20 },
            { img:'https://epohopes.github.io/planet11.png',xRatio:0.1, yRatio:0.3, speed:-0.003, size:15 },
            { img:'https://epohopes.github.io/planet12.png',xRatio:0.6, yRatio:0.15, speed:0.004, size:15 },
            { img:'https://epohopes.github.io/planet13.png',xRatio:0.92, yRatio:0.32, speed:-0.004, size:30 },
            { img:'https://epohopes.github.io/planet14.png',xRatio:0.4, yRatio:0.62, speed:0.003, size:15 },
            { img:'https://epohopes.github.io/planet15.png',xRatio:0.25, yRatio:0.88, speed:-0.005, size:15 },
            { img:'https://epohopes.github.io/planet16.png',xRatio:0.78, yRatio:0.48, speed:0.004, size:40 }
        ];
        // 7张宇航员参数 - 完整CDN路径，全部永久悬浮显示
        const astroConfig = [
            { img:"https://epohopes.github.io/astronaut1.png", xRatio:0.12, yRatio:0.2, delay:"0s" },
            { img:"https://epohopes.github.io/astronaut2.png", xRatio:0.88, yRatio:0.28, delay:"0.6s" },
            { img:"https://epohopes.github.io/astronaut3.png", xRatio:0.08, yRatio:0.65, delay:"1.2s" },
            { img:"https://epohopes.github.io/astronaut4.png", xRatio:0.91, yRatio:0.72, delay:"1.8s" },
            { img:"https://epohopes.github.io/astronaut5.png", xRatio:0.18, yRatio:0.45, delay:"2.4s" },
            { img:"https://epohopes.github.io/astronaut6.png", xRatio:0.82, yRatio:0.52, delay:"3s" },
            { img:"https://epohopes.github.io/astronaut7.png", xRatio:0.48, yRatio:0.32, delay:"3.6s" }
        ];
        // ========================================================

        document.getElementById('starId').innerText = `恒星编号：S-${starCode}`;

        // 生日计时
        function updateTime() {
            const now = Date.now();
            const born = birthday.getTime();
            const ms = now - born;
            if (ms < 0) {
                document.getElementById('liveTime').innerText = '🎂 生日尚未到来，期待中...';
                return;
            }
            const day = Math.floor(ms / (1000 * 60 * 60 * 24));
            const hour = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('liveTime').innerText = `自诞生至今，宇宙已运行 ${day} 天 ${hour} 小时`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 滚动文字高亮
        const textContainer = document.getElementById('mainText');
        const lines = document.querySelectorAll('.text-line');
        function updateActiveLine() {
            const containerTop = textContainer.scrollTop;
            const midPoint = containerTop + textContainer.clientHeight / 2;
            lines.forEach(line => line.classList.remove('active'));
            lines.forEach(line => {
                const lineTop = line.offsetTop;
                const lineBot = lineTop + line.offsetHeight;
                if (midPoint >= lineTop && midPoint <= lineBot) line.classList.add('active');
            })
        }
        textContainer.addEventListener('scroll', updateActiveLine);
        updateActiveLine();

        // ========== 核心修复：严格顺序，彻底消除 planetList 暂时性死区 ==========
        let planetList = [];
        let astroList = [];
        let stars = [];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let core = { x: 0, y: 0 };

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            core.x = W / 2;
            core.y = H / 2;
            planetList.forEach(p => {
                p.x = W * p.cfg.xRatio;
                p.y = H * p.cfg.yRatio;
                p.dom.style.left = p.x + 'px';
                p.dom.style.top = p.y + 'px';
            })
            astroList.forEach(a => {
                a.x = W * a.cfg.xRatio;
                a.y = H * a.cfg.yRatio;
                a.dom.style.left = a.x + 'px';
                a.dom.style.top = a.y + 'px';
            })
        }

        // 生成行星DOM
        const planetBox = document.getElementById('planetBox');
        planetConfig.forEach(cfg => {
            const wrap = document.createElement('div');
            wrap.className = 'planet-item';
            // 删掉这一行：wrap.style.animationDuration = cfg.spinTime + 's';
            // 新增浮动延迟，错开上下浮动节奏
            wrap.style.animationDelay = `${Math.random() * 3}s`;

            const img = document.createElement('img');
            img.src = cfg.img;
            img.alt = '行星';
            img.onerror = () => console.error("行星资源加载失败：", cfg.img);
            wrap.appendChild(img);
            planetBox.appendChild(wrap);
            planetList.push({
                cfg: cfg,
                x: W * cfg.xRatio,
                y: H * cfg.yRatio,
                dom: wrap
            })
        })
        // 生成宇航员DOM + 加载失败日志，无隐藏逻辑，全部永久渲染
        const astroBox = document.getElementById('astroBox');
        astroConfig.forEach(cfg => {
            const wrap = document.createElement('div');
            wrap.className = 'astro-item';
            wrap.style.animationDelay = cfg.delay;
            const img = document.createElement('img');
            img.src = cfg.img;
            img.alt = "宇航员";
            // 图片加载失败捕获
            img.onerror = () => console.error("宇航员资源加载失败：", cfg.img);
            wrap.appendChild(img);
            astroBox.appendChild(wrap);
            astroList.push({
                cfg: cfg,
                x: W * cfg.xRatio,
                y: H * cfg.yRatio,
                dom: wrap
            })
        })

        window.addEventListener('resize', resize);
        resize();

        // 生成星空点位
        for (let i = 0; i < 1500; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.4 + 0.3,
                speed: Math.random() * 0.18 + 0.02
            });
        }

        // 星空渲染循环
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                s.x -= s.speed;
                if (s.x < 0) s.x = W;
            });
            planetList.forEach(p => {
                p.x += p.cfg.speed;
                if (p.x < -p.cfg.size * 2) p.x = W + p.cfg.size * 2;
                if (p.x > W + p.cfg.size * 2) p.x = -p.cfg.size * 2;
                p.dom.style.left = p.x + 'px';
                p.dom.style.top = p.y + 'px';
            })
            requestAnimationFrame(draw);
        }
        draw();

        // 双击备忘录弹窗
        const note = document.getElementById('note');
        document.body.addEventListener('dblclick', () => note.style.display = 'block');
        note.addEventListener('click', () => note.style.display = 'none');

        // 点击播放音频
        const audio = document.getElementById('birthdayAudio');
        let audioPlayed = false;
        function playAudio() {
            if (!audioPlayed) {
                audio.play().then(() => audioPlayed = true).catch(() => {});
            }
        }
        const clickHandler = function() {
            if (!audioPlayed) {
                playAudio();
                document.removeEventListener('click', clickHandler);
                document.removeEventListener('touchstart', clickHandler);
            }
        };
        document.addEventListener('click', clickHandler);
        document.addEventListener('touchstart', clickHandler, { passive: true });

        console.log('✨ 页面加载完成：所有宇航员永久悬浮显示，16颗行星横向自转');
    </script>
</body>
</html>
