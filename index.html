<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方炯20岁生日快乐</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: "Consolas", monospace;
            color: #b0c4de;
            cursor: default;
        }

        /* ===== Canvas 星空背景（仅小星星，无中心亮光） ===== */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ===== 行星容器 ===== */
        #planetBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1.5;
            pointer-events: none;
        }
        .planet-item {
            position: absolute;
            pointer-events: none;
            animation: planetSpin 12s linear infinite;
        }
        @keyframes planetSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .planet-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ===== 宇航员容器（所有宇航员统一管理） ===== */
        #astroBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1.8;
            pointer-events: none;
        }
        .astro-item {
            position: absolute;
            opacity: 0.8;
            animation: float 4s ease-in-out infinite;
        }
        .astro-item img {
            width: 90px;
            height: auto;
            object-fit: contain;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-14px); }
            100% { transform: translateY(0px); }
        }

        /* ===== 内容文字层 ===== */
        .wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* ===== 恒星编号 ===== */
        .star-id {
            font-size: 16px;
            letter-spacing: 4px;
            opacity: 0.6;
            margin-bottom: 24px;
            user-select: none;
        }

        /* ===== 可滚动文案，居中行自动放大高亮 ===== */
        .main-text {
            max-width: 600px;
            max-height: 40vh;
            overflow-y: auto;
            line-height: 2.2;
            font-size: 24px;
            opacity: 0.9;
            padding: 10px 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(176, 196, 222, 0.4) rgba(255, 255, 255, 0.05);
            scroll-snap-type: y mandatory;
        }
        .text-line {
            scroll-snap-align: center;
            padding: 6px 0;
            transition: all 0.3s ease;
            opacity: 0.6;
            font-size: 22px;
        }
        .text-line.active {
            font-size: 28px;
            opacity: 1;
            color: #e0edff;
            text-shadow: 0 0 12px rgba(200, 220, 255, 0.6);
        }
        .main-text::-webkit-scrollbar {
            width: 5px;
        }
        .main-text::-webkit-scrollbar-thumb {
            background: rgba(176, 196, 222, 0.4);
            border-radius: 3px;
        }
        .main-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        /* ===== 计时器 ===== */
        .timer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.6;
            user-select: none;
        }

        /* ===== 底部提示 ===== */
        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 13px;
            opacity: 0.35;
            user-select: none;
        }

        /* ===== 备忘录弹窗 ===== */
        .hidden-note {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 15, 25, 0.95);
            padding: 32px;
            border: 1px solid #445577;
            max-width: 500px;
            width: 90%;
            z-index: 10;
            display: none;
            font-size: 18px;
            line-height: 1.8;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(68, 85, 119, 0.3);
            backdrop-filter: blur(4px);
            cursor: pointer;
            user-select: none;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 480px) {
            .main-text {
                max-height: 50vh;
                padding: 10px 12px;
            }
            .text-line {
                font-size: 16px;
            }
            .text-line.active {
                font-size: 22px;
            }
            .star-id {
                font-size: 13px;
                letter-spacing: 2px;
            }
            .hidden-note {
                font-size: 16px;
                padding: 24px 20px;
            }
            .astro-item img {
                width: 70px;
            }
            .planet-item {
                animation-duration: 16s;
            }
        }
    </style>
</head>
<body>
<!-- 生日音频 -->
    <audio id="birthdayAudio" loop preload="auto">
        <source src="./birthday_song.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放，请升级浏览器。
    </audio>

    <!-- 星空画布 -->
    <canvas id="canvas"></canvas>

    <!-- 行星容器，JS自动生成全部16颗行星 -->
    <div id="planetBox"></div>

    <!-- 7个宇航员统一容器，全部同时显示 -->
    <div id="astroBox"></div>

    <!-- 主文字内容 -->
    <div class="wrap">
        <div class="star-id" id="starId">恒星编号：S-Fjong-2006-708</div>
        <div class="main-text" id="mainText">
            <div class="text-line">写给你的生日祝福</div>
            <div class="text-line">茫茫星海亿万光年</div>
            <div class="text-line">能与你相遇是极小概率的奇迹</div>
            <div class="text-line">祝你岁岁平安，生日快乐</div>
            <div class="text-line">往后每一年的星空，都有我陪你看</div>
        </div>
        <div class="timer" id="liveTime">计算中...</div>
        <div class="hint">双击星空打开私人备忘录 · 点击页面播放生日歌</div>
    </div>

    <!-- 备忘录弹窗 -->
    <div class="hidden-note" id="note">
        这里替换成你想写的私密心里话<br><br>
        点击弹窗任意位置关闭
    </div>

    <script>
        // ===================== 【自定义修改区】 =====================
        const birthday = new Date('2006-07-08');
        const starCode = 'Fjong-2006-708';

        // 1. 全部16颗行星配置（原有10颗 + 新增6颗）
        const planetConfig = [
            { img:'planet1.png', xRatio:0.2, yRatio:0.3, speed:0.022, size:42, spinTime:12 },
            { img:'planet2.png', xRatio:0.8, yRatio:0.6, speed:-0.016, size:56, spinTime:14 },
            { img:'planet3.png', xRatio:0.3, yRatio:0.75, speed:0.032, size:40, spinTime:10 },
            { img:'planet4.png', xRatio:0.7, yRatio:0.22, speed:-0.02, size:36, spinTime:16 },
            { img:'planet5.png', xRatio:0.15, yRatio:0.55, speed:0.018, size:38, spinTime:11 },
            { img:'planet6.png', xRatio:0.85, yRatio:0.4, speed:-0.025, size:34, spinTime:13 },
            { img:'planet7.png', xRatio:0.45, yRatio:0.25, speed:0.02, size:48, spinTime:15 },
            { img:'planet8.png', xRatio:0.05, yRatio:0.15, speed:0.015, size:30, spinTime:9 },
            { img:'planet9.png', xRatio:0.9, yRatio:0.7, speed:-0.012, size:32, spinTime:12 },
            { img:'planet10.png',xRatio:0.55, yRatio:0.8, speed:0.028, size:44, spinTime:14 },
            // 新增6颗行星
            { img:'planet11.png',xRatio:0.1, yRatio:0.3, speed:-0.019, size:35, spinTime:13 },
            { img:'planet12.png',xRatio:0.6, yRatio:0.15, speed:0.024, size:41, spinTime:11 },
            { img:'planet13.png',xRatio:0.92, yRatio:0.32, speed:-0.021, size:33, spinTime:15 },
            { img:'planet14.png',xRatio:0.4, yRatio:0.62, speed:0.017, size:39, spinTime:10 },
            { img:'planet15.png',xRatio:0.25, yRatio:0.88, speed:-0.027, size:31, spinTime:14 },
            { img:'planet16.png',xRatio:0.78, yRatio:0.48, speed:0.02, size:45, spinTime:12 }
        ];

        // 2. 7张宇航员文件命名 + 各自屏幕位置（全部同时显示）
        const astroConfig = [
            { img:"astronaut1.png", xRatio:0.12, yRatio:0.2, delay:"0s" },
            { img:"astronaut2.png", xRatio:0.88, yRatio:0.28, delay:"0.6s" },
            { img:"astronaut3.png", xRatio:0.08, yRatio:0.65, delay:"1.2s" },
            { img:"astronaut4.png", xRatio:0.91, yRatio:0.72, delay:"1.8s" },
            { img:"astronaut5.png", xRatio:0.18, yRatio:0.45, delay:"2.4s" },
            { img:"astronaut6.png", xRatio:0.82, yRatio:0.52, delay:"3s" },
            { img:"astronaut7.png", xRatio:0.48, yRatio:0.32, delay:"3.6s" }
        ];
        // ====================================================================

        document.getElementById('starId').innerText = `恒星编号：S-${starCode}`;

        // 生日倒计时计时器
        function updateTime() {
            const now = Date.now();
            const born = birthday.getTime();
            const ms = now - born;
            if (ms < 0) {
                document.getElementById('liveTime').innerText = '🎂 生日尚未到来，期待中...';
                return;
            }
            const day = Math.floor(ms / (1000 * 60 * 60 * 24));
            const hour = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('liveTime').innerText = `自诞生至今，宇宙已运行 ${day} 天 ${hour} 小时`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 滚动文字居中高亮放大逻辑
        const textContainer = document.getElementById('mainText');
        const lines = document.querySelectorAll('.text-line');
        function updateActiveLine() {
            const containerTop = textContainer.scrollTop;
            const midPoint = containerTop + textContainer.clientHeight / 2;
            lines.forEach(line => line.classList.remove('active'));
            lines.forEach(line => {
                const lineTop = line.offsetTop;
                const lineBot = lineTop + line.offsetHeight;
                if (midPoint >= lineTop && midPoint <= lineBot) line.classList.add('active');
            })
        }
        textContainer.addEventListener('scroll', updateActiveLine);
        updateActiveLine();

        // 1. 画布基础变量
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let core = { x: 0, y: 0 };

        // 2. 仅定义resize，不执行
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            core.x = W / 2;
            core.y = H / 2;
            planetList.forEach(p => {
                p.x = W * p.cfg.xRatio;
                p.y = H * p.cfg.yRatio;
                p.dom.style.left = p.x + 'px';
                p.dom.style.top = p.y + 'px';
            })
            astroList.forEach(a => {
                a.x = W * a.cfg.xRatio;
                a.y = H * a.cfg.yRatio;
                a.dom.style.left = a.x + 'px';
                a.dom.style.top = a.y + 'px';
            })
        }

        // 3. 生成星星
        let stars = [];
        for (let i = 0; i < 1500; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.4 + 0.3,
                speed: Math.random() * 0.18 + 0.02
            });
        }

        // 4. 先创建行星DOM，初始化planetList（关键前置步骤）
        const planetBox = document.getElementById('planetBox');
        let planetList = [];
        planetConfig.forEach(cfg => {
            const wrap = document.createElement('div');
            wrap.className = 'planet-item';
            wrap.style.width = cfg.size + 'px';
            wrap.style.animationDuration = cfg.spinTime + 's';
            const img = document.createElement('img');
            img.src = `./${cfg.img}`;
            img.alt = '行星';
            wrap.appendChild(img);
            planetBox.appendChild(wrap);
            planetList.push({
                cfg: cfg,
                x: W * cfg.xRatio,
                y: H * cfg.yRatio,
                dom: wrap
            })
        })

        // 5. 先创建宇航员DOM，初始化astroList
        const astroBox = document.getElementById('astroBox');
        let astroList = [];
        astroConfig.forEach(cfg => {
            const wrap = document.createElement('div');
            wrap.className = 'astro-item';
            wrap.style.animationDelay = cfg.delay;
            const img = document.createElement('img');
            img.src = `./${cfg.img}`;
            img.alt = "宇航员";
            wrap.appendChild(img);
            astroBox.appendChild(wrap);
            astroList.push({
                cfg: cfg,
                x: W * cfg.xRatio,
                y: H * cfg.yRatio,
                dom: wrap
            })
        })

        // 6. 全部数组创建完成后，再绑定resize、执行resize
        window.addEventListener('resize', resize);
        resize();

        // 7. 渲染循环
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                s.x -= s.speed;
                if (s.x < 0) s.x = W;
            });
            planetList.forEach(p => {
                p.x += p.cfg.speed;
                if (p.x < -p.cfg.size * 2) p.x = W + p.cfg.size * 2;
                if (p.x > W + p.cfg.size * 2) p.x = -p.cfg.size * 2;
                p.dom.style.left = p.x + 'px';
                p.dom.style.top = p.y + 'px';
            })
            requestAnimationFrame(draw);
        }
        draw();

        // 双击打开备忘录
        const note = document.getElementById('note');
        document.body.addEventListener('dblclick', () => note.style.display = 'block');
        note.addEventListener('click', () => note.style.display = 'none');

        // 点击播放生日音乐（兼容微信/移动端）
        const audio = document.getElementById('birthdayAudio');
        let audioPlayed = false;
        function playAudio() {
            if (!audioPlayed) {
                audio.play().then(() => audioPlayed = true).catch(() => {});
            }
        }
        const clickHandler = function() {
            if (!audioPlayed) {
                playAudio();
                document.removeEventListener('click', clickHandler);
                document.removeEventListener('touchstart', clickHandler);
            }
        };
        document.addEventListener('click', clickHandler);
        document.addEventListener('touchstart', clickHandler, { passive: true });
        document.addEventListener('click', () => {
            if (!audioPlayed) audio.play().catch(()=>{});
        });

        console.log('✨ 页面加载完成：16颗行星横向自转，7张宇航员同时悬浮显示');
    </script>
</body>
</html>
