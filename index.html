<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>方炯20岁生日快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: "Consolas", monospace;
            color: #b0c4de;
            cursor: default;
        }

        /* ===== 密码解锁弹窗 ===== */
        .password-box {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        .password-box h2 {
            color: #fff;
            font-size: 32px;
        }
        #pwdInput {
            width: 320px;
            padding: 14px 18px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            outline: none;
        }
        #unlockBtn {
            padding: 12px 40px;
            font-size: 18px;
            background: #445577;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .password-box .tip {
            color: #ff6666;
            font-size: 16px;
            display: none;
        }

        /* ===== 主页面（默认隐藏） ===== */
        .page-main {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
        }
        .page-main.show {
            visibility: visible;
            pointer-events: auto;
            opacity: 1;
        }

        /* ===== Canvas 星空背景 ===== */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ===== 行星 & 宇航员容器 ===== */
        #planetBox,
        #astroBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 3;
            pointer-events: none;
        }
        .planet-item,
        .astro-item {
            position: absolute;
            pointer-events: none;
            animation: float 4s ease-in-out infinite;
            opacity: 0.75;
        }
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-14px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        .planet-item img,
        .astro-item img {
            width: 90px;
            height: auto;
            object-fit: contain;
        }
        .astro-item {
            opacity: 0.8;
        }

        /* ===== 文字内容层 布局调整 ===== */
        .wrap {
            position: relative;
            z-index: 4;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* 垂直空间均分，主文本居中 */
            justify-content: space-around;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        /* 中间文本容器单独块 */
        .text-middle-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .star-id {
            font-size: 16px;
            letter-spacing: 4px;
            margin-bottom: 24px;
            color: #ffffff;
            user-select: none;
        }
        .main-text {
            max-width: 600px;
            max-height: 40vh;
            overflow-y: auto;
            line-height: 2.2;
            font-size: 24px;
            color: #ffffff;
            padding: 10px 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(176, 196, 222, 0.4) rgba(255, 255, 255, 0.05);
            scroll-snap-type: y mandatory;
            text-align: center;
        }
        .text-line {
            scroll-snap-align: center;
            padding: 6px 0;
            transition: all 0.3s ease;
            color: #ffffff;
            font-size: 22px;
            margin: 8px 0;
        }
        .text-line.active {
            font-size: 28px;
            text-shadow: 0 0 12px rgba(200, 220, 255, 0.6);
        }
        .main-text::-webkit-scrollbar {
            width: 5px;
        }
        .main-text::-webkit-scrollbar-thumb {
            background: rgba(176, 196, 222, 0.4);
            border-radius: 3px;
        }
        .main-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        /* 计时器大幅拉开距离，不和主文本重叠 */
        .timer {
            margin-top: 180px;
            font-size: 14px;
            user-select: none;
            white-space: pre-line;
            line-height: 1.8;
            color: #fff;
        }
        /* 底部提示固定在最下方，和计时器完全分离 */
        .hint {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            user-select: none;
            color: #fff;
        }

        /* ===== 备忘录弹窗 ===== */
        .hidden-note {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 15, 25, 0.95);
            padding: 40px 30px;
            border: 1px solid #445577;
            max-width: 550px;
            width: 90%;
            z-index: 99999;
            display: none;
            font-size: 22px;
            line-height: 2;
            border-radius: 10px;
            box-shadow: 0 0 80px rgba(68, 85, 119, 0.4);
            backdrop-filter: blur(6px);
            cursor: pointer;
            user-select: none;
            color: #fff;
            text-align: center;
        }

        @media (max-width: 480px) {
            .main-text {
                max-height: 50vh;
                padding: 10px 12px;
            }
            .text-line {
                font-size: 16px;
            }
            .text-line.active {
                font-size: 22px;
            }
            .star-id {
                font-size: 13px;
                letter-spacing: 2px;
            }
            .hidden-note {
                font-size: 16px;
                padding: 24px 20px;
            }
            .astro-item img {
                width: 70px;
            }
            .timer {
                margin-top: 120px;
            }
        }
    </style>
</head>
<body>

<!-- 密码解锁弹窗 -->
<div class="password-box" id="pwdBox">
    <h2>请输入解锁密码</h2>
    <input type="password" id="pwdInput" placeholder="输入密码" />
    <button id="unlockBtn">解锁进入</button>
    <p class="tip">密码错误，请重新输入</p>
</div>

<!-- 主页面 -->
<div class="page-main" id="pageMain">

    <!-- 音频 -->
    <audio id="birthdayAudio" loop preload="auto" style="display:none;">
        <source src="https://epohopes.github.io/birthday_song.mp3" type="audio/mpeg" />
        您的浏览器不支持音频播放，请升级浏览器。


        <canvas id="canvas"></canvas>
        <div id="planetBox"></div>
        <div id="astroBox"></div>

        <div class="wrap">
            <!-- 中间所有文本包裹统一居中 -->
            <div class="text-middle-block">
                <div class="star-id" id="starId">恒星编号：S-Fjiong-2006-708</div>
                <div class="main-text" id="mainText">
                    <div class="text-line">祝方炯同学20岁生日快乐！</div>
                    <div class="text-line">茫茫星海亿万光年</div>
                    <div class="text-line">能与你相遇是极小概率的奇迹</div>
                    <div class="text-line">全球总人口 ≈ 80 亿 = 8000000000 人</div>
                    <div class="text-line">人的一生平均会遇见 80000 人</div>
                    <div class="text-line">单次随机相遇概率 = 一生遇见人数 ÷ 全球总人口</div>
                    <div class="text-line">= 80000 ÷ 8000000000</div>
                    <div class="text-line">= 0.00001</div>
                    <div class="text-line">= 1/100000（十万分之一）</div>
                    <div class="text-line">祝你岁岁平安，生日快乐！</div>
                </div>
            </div>
            <!-- 计时器单独靠下，和主文本拉开超大间距 -->
            <div class="timer" id="liveTime">计算中...</div>
            <!-- 底部提示固定最底部，完全不重叠 -->
            <div class="hint">双击星空打开私人备忘录 · 点击页面播放生日歌</div>
        </div>

        <div class="hidden-note" id="note">
            <div class="text-line">愿你：</div>
            <div class="text-line">一岁一礼，一寸欢喜；</div>
            <div class="text-line">无忧无疾，不离笑颜。</div>
            <div class="text-line">健康成长，年少有为。</div>
        </div>


<script>
    // ==================== 密码解锁 ====================
    const correctPassword = "0708";
    const pwdBox = document.getElementById("pwdBox");
    const pageMain = document.getElementById("pageMain");
    const pwdInput = document.getElementById("pwdInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const tipText = document.querySelector(".password-box .tip");

    // 先初始化页面（此时仍隐藏，但 DOM 已就绪）
    initPageScript();

    function unlockPage() {
        const inputVal = pwdInput.value.trim();
        if (inputVal === correctPassword) {
            pageMain.classList.add("show");
            pwdBox.remove();
            tipText.style.display = "none";
            resize();
        } else {
            tipText.style.display = "block";
            pwdInput.value = "";
        }
    }
    unlockBtn.addEventListener("click", unlockPage);
    pwdInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") unlockPage();
    });

    // ==================== 页面核心逻辑 ====================
    function initPageScript() {
        const birthday = new Date('2006-07-08');
        const starCode = 'Fjiong-2006-708';

        // 行星配置
        const planetConfig = [
            { img: 'https://epohopes.github.io/planet1.png', xRatio: 0.2, yRatio: 0.3, speed: 0.005 },
            { img: 'https://epohopes.github.io/planet2.png', xRatio: 0.8, yRatio: 0.6, speed: -0.004 },
            { img: 'https://epohopes.github.io/planet3.png', xRatio: 0.3, yRatio: 0.75, speed: 0.006 },
            { img: 'https://epohopes.github.io/planet4.png', xRatio: 0.7, yRatio: 0.22, speed: -0.003 },
            { img: 'https://epohopes.github.io/planet5.png', xRatio: 0.15, yRatio: 0.55, speed: 0.003 },
            { img: 'https://epohopes.github.io/planet6.png', xRatio: 0.85, yRatio: 0.4, speed: -0.004 },
            { img: 'https://epohopes.github.io/planet7.png', xRatio: 0.15, yRatio: 0.25, speed: 0.004 },
            { img: 'https://epohopes.github.io/planet8.png', xRatio: 0.05, yRatio: 0.15, speed: 0.002 },
            { img: 'https://epohopes.github.io/planet9.png', xRatio: 0.9, yRatio: 0.7, speed: -0.002 },
            { img: 'https://epohopes.github.io/planet10.png', xRatio: 0.55, yRatio: 0.8, speed: 0.005 },
            { img: 'https://epohopes.github.io/planet11.png', xRatio: 0.1, yRatio: 0.3, speed: -0.003 },
            { img: 'https://epohopes.github.io/planet12.png', xRatio: 0.6, yRatio: 0.15, speed: 0.004 },
            { img: 'https://epohopes.github.io/planet13.png', xRatio: 0.92, yRatio: 0.32, speed: -0.004 },
            { img: 'https://epohopes.github.io/planet14.png', xRatio: 0.25, yRatio: 0.62, speed: 0.003 },
            { img: 'https://epohopes.github.io/planet15.png', xRatio: 0.25, yRatio: 0.88, speed: -0.005 },
            { img: 'https://epohopes.github.io/planet16.png', xRatio: 0.78, yRatio: 0.48, speed: 0.004 }
        ];

        // 宇航员配置
        const astroConfig = [
            { img: "https://epohopes.github.io/astronaut1.png", xRatio: 0.12, yRatio: 0.2, delay: "0s" },
            { img: "https://epohopes.github.io/astronaut2.png", xRatio: 0.88, yRatio: 0.28, delay: "0.6s" },
            { img: "https://epohopes.github.io/astronaut3.png", xRatio: 0.08, yRatio: 0.65, delay: "1.2s" },
            { img: "https://epohopes.github.io/astronaut4.png", xRatio: 0.91, yRatio: 0.72, delay: "1.8s" },
            { img: "https://epohopes.github.io/astronaut5.png", xRatio: 0.15, yRatio: 0.45, delay: "2.4s" },
            { img: "https://epohopes.github.io/astronaut6.png", xRatio: 0.82, yRatio: 0.52, delay: "3s" },
            { img: "https://epohopes.github.io/astronaut7.png", xRatio: 0.48, yRatio: 0.32, delay: "3.6s" }
        ];

        document.getElementById('starId').innerText = `恒星编号：S-${starCode}`;

        // 计时器
        function updateTime() {
            const now = Date.now();
            const born = birthday.getTime();
            const ms = now - born;
            if (ms < 0) {
                document.getElementById('liveTime').innerText = '🎂 生日尚未到来，期待中...';
                return;
            }
            const day = Math.floor(ms / (1000 * 60 * 60 * 24));
            const hour = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('liveTime').innerText =
                `自诞生至今，属于你的宇宙已运行 ${day} 天 ${hour} 小时`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 滚动高亮
        const textContainer = document.getElementById('mainText');
        const lines = document.querySelectorAll('.text-line');

        function updateActiveLine() {
            const containerTop = textContainer.scrollTop;
            const midPoint = containerTop + textContainer.clientHeight / 2;
            lines.forEach(line => line.classList.remove('active'));
            lines.forEach(line => {
                const lineTop = line.offsetTop;
                const lineBot = lineTop + line.offsetHeight;
                if (midPoint >= lineTop && midPoint <= lineBot) line.classList.add('active');
            });
        }
        textContainer.addEventListener('scroll', updateActiveLine);
        updateActiveLine();

        // Canvas 星空
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let core = { x: 0, y: 0 };

        const planetList = [];
        const astroList = [];
        let stars = [];

        // 行星 DOM
        const planetBox = document.getElementById('planetBox');
        planetConfig.forEach(cfg => {
            const wrap = document.createElement('div');
            wrap.className = 'planet-item';
            wrap.style.animationDelay = `${Math.random() * 3}s`;
            const img = document.createElement('img');
            img.src = cfg.img;
            img.alt = '行星';
            img.onerror = () => console.error("行星资源加载失败：", cfg.img);
            wrap.appendChild(img);
            planetBox.appendChild(wrap);
            planetList.push({ cfg, x: 0, y: 0, dom: wrap });
        });

        // 宇航员 DOM
        const astroBox = document.getElementById('astroBox');
        astroConfig.forEach(cfg => {
            const wrap = document.createElement('div');
            wrap.className = 'astro-item';
            wrap.style.animationDelay = cfg.delay;
            const img = document.createElement('img');
            img.src = cfg.img;
            img.alt = "宇航员";
            img.onerror = () => console.error("宇航员资源加载失败：", cfg.img);
            wrap.appendChild(img);
            astroBox.appendChild(wrap);
            astroList.push({ cfg, x: 0, y: 0, dom: wrap });
        });

        window.resize = function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            core.x = W / 2;
            core.y = H / 2;
            planetList.forEach(p => {
                p.x = W * p.cfg.xRatio;
                p.y = H * p.cfg.yRatio;
                p.dom.style.left = p.x + 'px';
                p.dom.style.top = p.y + 'px';
            });
            astroList.forEach(a => {
                a.x = W * a.cfg.xRatio;
                a.y = H * a.cfg.yRatio;
                a.dom.style.left = a.x + 'px';
                a.dom.style.top = a.y + 'px';
            });
        };

        window.addEventListener('resize', resize);
        resize();

        // 生成星星
        for (let i = 0; i < 1500; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.4 + 0.3,
                speed: Math.random() * 0.18 + 0.02
            });
        }

        // 渲染循环
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
                s.x -= s.speed;
                if (s.x < 0) s.x = W;
            });
            planetList.forEach(p => {
                p.x += p.cfg.speed;
                const width = 90;
                if (p.x < -width * 2) p.x = W + width * 2;
                if (p.x > W + width * 2) p.x = -width * 2;
                p.dom.style.left = p.x + 'px';
                p.dom.style.top = p.y + 'px';
            });
            requestAnimationFrame(draw);
        }
        draw();

        // 备忘录
        const note = document.getElementById('note');
        document.body.addEventListener('dblclick', () => {
            note.style.display = 'block';
        });
        note.addEventListener('click', function(e) {
            e.stopPropagation();
            this.style.display = 'none';
        });

        // 音频控制
        const audio = document.getElementById('birthdayAudio');
        let audioPlayed = false;

        document.addEventListener('click', function(e) {
            if (e.target.closest('#note')) return;
            if (!audioPlayed) {
                audio.play().then(() => { audioPlayed = true; }).catch(() => {});
            } else {
                audio.pause();
                audioPlayed = false;
            }
        });
        document.addEventListener('touchstart', function(e) {
            if (e.target.closest('#note')) return;
            if (!audioPlayed) {
                audio.play().then(() => { audioPlayed = true; }).catch(() => {});
            } else {
                audio.pause();
                audioPlayed = false;
            }
        }, { passive: true });

        console.log('✨ 页面加载完成');
    }
</script>
</body>
</html>
