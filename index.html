<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方炯20岁生日快乐</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: "Consolas", monospace;
            color: #b0c4de;
            /* 点击任意位置触发音频播放（由JS控制） */
            cursor: default;
        }

        /* ===== Canvas 星空背景 ===== */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ===== 内容层 ===== */
        .wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            pointer-events: none;
            /* 让点击穿透，但内部可交互元素需恢复 */;
        }
        .wrap>* {
            pointer-events: auto;
            /* 子元素可点击 */;
        }

        /* ===== 恒星编号 ===== */
        .star-id {
            font-size: 16px;
            letter-spacing: 4px;
            opacity: 0.6;
            margin-bottom: 24px;
            user-select: none;
        }

        /* ===== 主文案（可滚动） ===== */
        .main-text {
            max-width: 600px;
            max-height: 40vh;
            overflow-y: auto;
            line-height: 2.2;
            font-size: 24px;
            opacity: 0.9;
            padding: 10px 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(176, 196, 222, 0.4) rgba(255, 255, 255, 0.05);
        }
        .main-text::-webkit-scrollbar {
            width: 5px;
        }
        .main-text::-webkit-scrollbar-thumb {
            background: rgba(176, 196, 222, 0.4);
            border-radius: 3px;
        }
        .main-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        /* ===== 计时器 ===== */
        .timer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.6;
            user-select: none;
        }

        /* ===== 底部提示 ===== */
        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 13px;
            opacity: 0.35;
            user-select: none;
            pointer-events: none;
        }

        /* ===== 私密备忘录弹窗 ===== */
        .hidden-note {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 15, 25, 0.95);
            padding: 32px;
            border: 1px solid #445577;
            max-width: 500px;
            width: 90%;
            z-index: 10;
            display: none;
            font-size: 18px;
            line-height: 1.8;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(68, 85, 119, 0.3);
            backdrop-filter: blur(4px);
            cursor: pointer;
            user-select: none;
        }

        /* ===== 宇航员浮动动画 ===== */
        .astronaut {
            margin-top: 32px;
            animation: float 4s ease-in-out infinite;
            opacity: 0.8;
        }
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-14px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* ===== 响应式微调 ===== */
        @media (max-width: 480px) {
            .main-text {
                font-size: 18px;
                max-height: 50vh;
                padding: 10px 12px;
            }
            .star-id {
                font-size: 13px;
                letter-spacing: 2px;
            }
            .hidden-note {
                font-size: 16px;
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

<!-- ====== 音频（loop + 预加载） ====== -->
<audio id="birthdayAudio" loop preload="auto">
    <source src="./birthday_song.mp3" type="audio/mpeg">
    <!-- 如果浏览器不支持，显示提示（可选） -->
    您的浏览器不支持音频播放，请升级浏览器。
</audio>

<!-- ====== Canvas 星空画布 ====== -->
<canvas id="canvas"></canvas>

<!-- ====== 主内容 ====== -->
<div class="wrap">

    <!-- 恒星编号（动态） -->
    <div class="star-id" id="starId">恒星编号：S-Fjong-2006-708</div>

    <!-- 主文案（可自由换行、可滚动） -->
    <div class="main-text" id="mainText">
        写给你的生日祝福<br>
        茫茫星海亿万光年<br>
        能与你相遇是极小概率的奇迹<br>
        祝你岁岁平安，生日快乐<br>
        往后每一年的星空，都有我陪你看
    </div>

    <!-- 浮动宇航员 SVG -->
    <div class="astronaut">
        <svg width="90" height="90" viewBox="0 0 24 24" fill="rgba(200,220,255,0.75)">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
        </svg>
    </div>

    <!-- 存活计时器 -->
    <div class="timer" id="liveTime">计算中...</div>

    <!-- 底部小提示 -->
    <div class="hint">双击星空打开私人备忘录 · 点击页面播放生日歌</div>
</div>

<!-- ====== 私密备忘录（双击触发） ====== -->
<div class="hidden-note" id="note">
    这里替换成你想写的私密心里话<br><br>
    点击弹窗任意位置关闭
</div>

<!-- ============================================================ -->
<script>
    // ===================== 【✏️ 仅修改下面 3 处内容】 =====================
    const birthday = new Date('2006-07-08'); // 改成对方真实生日 YYYY-MM-DD
    const starCode = 'Fjong-2006-708'; // 自定义专属恒星编号
    // 如果你想修改主文案，直接在上面的 .main-text 里改即可
    // ====================================================================

    // 1. 更新恒星编号
    document.getElementById('starId').innerText = `恒星编号：S-${starCode}`;

    // 2. 计时器：计算存活天数 + 小时
    function updateTime() {
        const now = Date.now();
        const born = birthday.getTime();
        const ms = now - born;
        if (ms < 0) {
            document.getElementById('liveTime').innerText = '🎂 生日尚未到来，期待中...';
            return;
        }
        const day = Math.floor(ms / (1000 * 60 * 60 * 24));
        const hour = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('liveTime').innerText =
            `自诞生至今，宇宙已运行 ${day} 天 ${hour} 小时`;
    }
    updateTime();
    setInterval(updateTime, 1000);

    // ============================================================
    // 3. Canvas 星空绘制
    // ============================================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => {
        resize();
        // 重置行星位置比例（避免跑出边界）
        planets.forEach((p, i) => {
            // 只调整比例，不重置位置
        });
        // 更新中心恒星位置
        core.x = W / 2;
        core.y = H / 2;
        // 重新分布星星（可选）
        stars.forEach(s => {
            s.x = Math.random() * W;
            s.y = Math.random() * H;
        });
    });
    resize();

    // --- 小星星（1500颗） ---
    let stars = [];
    for (let i = 0; i < 1500; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.3,
            speed: Math.random() * 0.18 + 0.02
        });
    }

    // --- 行星配置 ---
    let planets = [{
        x: W * 0.2,
        y: H * 0.3,
        r: 14,
        color: '#ff9468',
        speed: 0.022,
        orbit: 80
    }, {
        x: W * 0.8,
        y: H * 0.6,
        r: 20,
        color: '#88aaff',
        speed: -0.016,
        orbit: 100
    }, {
        x: W * 0.3,
        y: H * 0.75,
        r: 9,
        color: '#a8ffc2',
        speed: 0.032,
        orbit: 60
    }, {
        x: W * 0.7,
        y: H * 0.22,
        r: 11,
        color: '#ffdd99',
        speed: -0.02,
        orbit: 70
    }];

    // --- 中心恒星 ---
    let core = { x: W / 2, y: H / 2 };

    // --- 渲染主循环 ---
    function draw() {
        // 清空
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);

        // 1. 绘制流动小星星
        ctx.fillStyle = '#fff';
        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            s.x -= s.speed;
            if (s.x < 0) s.x = W;
        });

        // 2. 绘制行星 + 光晕
        planets.forEach(p => {
            p.x += p.speed;
            if (p.x < -p.r * 3) p.x = W + p.r * 3;
            if (p.x > W + p.r * 3) p.x = -p.r * 3;

            // 行星本体
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();

            // 外层光晕
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.5);
            grad.addColorStop(0, p.color + '70');
            grad.addColorStop(1, p.color + '00');
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
        });

        // 3. 中心发光主恒星
        const grad = ctx.createRadialGradient(core.x, core.y, 0, core.x, core.y, 140);
        grad.addColorStop(0, 'rgba(180,210,255,0.45)');
        grad.addColorStop(1, 'rgba(180,210,255,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(core.x, core.y, 140, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(draw);
    }
    draw();

    // ============================================================
    // 4. 双击打开私密备忘录
    // ============================================================
    const note = document.getElementById('note');
    document.body.addEventListener('dblclick', () => {
        note.style.display = 'block';
    });
    note.addEventListener('click', () => {
        note.style.display = 'none';
    });

    // ============================================================
    // 5. 生日音乐播放 —— 全局点击一次即播放（兼容微信/移动端）
    // ============================================================
    const audio = document.getElementById('birthdayAudio');
    let audioPlayed = false;

    // 尝试自动播放（部分浏览器允许，但多数需要用户交互）
    // 为了稳妥，我们使用用户点击触发
    function playAudio() {
        if (!audioPlayed) {
            audio.play().then(() => {
                audioPlayed = true;
                console.log('🎵 生日歌开始播放');
            }).catch(err => {
                // 如果播放失败（比如用户未交互），静默处理
                console.log('⏳ 等待用户交互后播放');
            });
        }
    }

    // 监听任何点击（body 或 document），播放一次后移除监听
    const clickHandler = function() {
        if (!audioPlayed) {
            playAudio();
            // 无论成功与否，移除监听，避免重复触发
            document.removeEventListener('click', clickHandler);
            document.removeEventListener('touchstart', clickHandler);
            // 如果播放失败，用户再次点击时通过其他方式触发
            // 但这里我们已移除监听，改用备用方式
        }
    };

    // 使用 click + touchstart 覆盖移动端
    document.addEventListener('click', clickHandler);
    document.addEventListener('touchstart', clickHandler, { passive: true });

    // 额外：如果用户点击了 .wrap 内的任何元素，也会触发（因为事件冒泡）
    // 但为了防止干扰，我们只绑定一次

    // 备用方案：如果用户点击了页面但 audio 还没播放，再尝试一次
    // 但由于我们已经移除了监听，这里用另一个更宽松的方式：
    // 在任何点击时检查 audioPlayed，若 false 则尝试播放
    document.addEventListener('click', function fallbackPlay() {
        if (!audioPlayed) {
            audio.play().then(() => {
                audioPlayed = true;
                console.log('🎵 生日歌（备用触发）');
            }).catch(() => {});
        }
    }, { once: false }); // 不 once，但内部判断

    // 不过上面的 fallback 会一直监听，但没关系，因为 audioPlayed 为 true 后就不再执行

    // ============================================================
    // 6. 额外：如果用户双击打开备忘录，顺便也触发一次播放（锦上添花）
    // ============================================================
    // 但双击会触发两次 click，但我们的 audioPlayed 已经控制了，不会重复播放

    console.log('✨ 页面加载完成，祝方炯生日快乐！');
</script>

</body>
</html>
